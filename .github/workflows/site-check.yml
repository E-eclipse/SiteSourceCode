name: Site Check

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  site-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Start local static server
        run: |
          python -m http.server 8000 --bind 127.0.0.1 &
          echo $! > server.pid

      - name: Wait for local site
        run: |
          for i in {1..10}; do
            if curl -fsS http://127.0.0.1:8000/ > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Local site did not start in time"
          exit 1

      - name: Verify local homepage
        run: |
          curl -fsS http://127.0.0.1:8000/ | grep -q "<title>"

      - name: Ping production site
        run: |
          curl -fsSIL --max-time 20 https://www.e-eclipse.ru/

      - name: Stop local server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" || true
          fi
